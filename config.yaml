# ------------------------------------
# YOUR LOCATION
# ------------------------------------
your_city: "Charlotte, NC"
max_office_miles: 20          # Max commute for in-office roles
include_remote: true
include_contract: true

# ------------------------------------
# TARGET ROLES (title must contain one of these — case insensitive)
# ------------------------------------
title_filters:
  # Primary: Compliance / Risk / Fraud
  - "fraud analyst"
  - "fraud detection"
  - "compliance analyst"
  - "risk analyst"
  - "revenue integrity"
  - "audit analyst"
  - "risk and compliance"
  # Secondary: Executive Assistant / Business Partner
  - "executive assistant"
  - "executive business partner"
  - "chief of staff"
  - "associate chief of staff"
  - "administrative assistant"
  - "executive support"
  # Data / Analytics
  - "data analyst"
  - "business analyst"
  - "reporting analyst"
  - "analytics"
  - "operations analyst"
  - "business operations analyst"
  - "sales operations"
  # Project / Program Coordinator
  - "project coordinator"
  - "program coordinator"
  - "operations coordinator"
  - "project management analyst"

# ------------------------------------
# KEYWORD SCORING WEIGHTS
# Higher = more important to you
# ------------------------------------
